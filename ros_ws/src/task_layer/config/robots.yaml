# Robot registry — data source for the coordination layer (task_allocator,
# and later the v0.4 action-based coordinator). Area keys reference
# world_model.yaml; topic/action names are fully qualified because the
# coordinator runs in the root namespace on the operator laptop.

# East opening of the mother_base bay (between the wall_mother_base_north end
# at x=-1.1 and the south end at x=-2.2). All home docks are behind it, so at
# most one returning robot may thread it at a time.
home_gate: {x: -1.65, y: -3.3, radius: 1.0}

robots:
  tb3:
    display_name: "Robot B - TB3 Inspector"
    type: inspector
    capabilities: [navigate, lidar_scan, camera_capture]
    nav_action: /tb3/navigate_to_pose
    amcl_pose_topic: /tb3/amcl_pose
    home_area: charging_station
    home_pose: {x: -4.8, y: -3.825, yaw: -1.5708}   # south-wall charging dock
  arm:
    display_name: "Robot A - Mobile Manipulator"
    type: manipulator
    capabilities: [navigate, manipulate]
    nav_action: /arm/navigate_to_pose
    amcl_pose_topic: /arm/amcl_pose
    home_area: mother_base
    home_pose: {x: -4.8, y: -2.95, yaw: 1.5708}     # north-side dock, mirrors tb3
